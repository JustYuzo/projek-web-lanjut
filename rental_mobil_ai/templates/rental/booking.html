<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Mobil</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f1117;
            color: white;
        }

        .container {
            padding: 40px;
            max-width: 700px;
            margin: auto;
        }

        .card {
            background-color: #171923;
            padding: 30px;
            border-radius: 18px;
            border: 1px solid #2d3748;
        }

        .car-img {
            height: 160px;
            background: #111827;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: none;
            box-sizing: border-box;
        }

        button, .back {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-decoration: none;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }

        .success {
            background: #14532d;
            color: #86efac;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .error {
            background: #7f1d1d;
            color: #fecaca;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .info {
            color: #d1d5db;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Form Booking</h1>

    <div class="card">
        <div class="car-img">{{ car.image }}</div>

        <h2>{{ car.name }}</h2>
        <p class="info">💰 Rp {{ car.price }} / hari</p>
        <p class="info">👥 {{ car.capacity }}</p>
        <p class="info">⚙️ {{ car.transmission }}</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="success">{{ success }}</div>
            <a href="{% url 'history' %}" class="back">Lihat Riwayat Booking</a>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Nama Penyewa</label>
            <input type="text" name="nama" placeholder="Masukkan nama">

            <label>Tanggal Sewa</label>
            <input type="date" name="tanggal" min="{{ today|date:'Y-m-d' }}" required>

            <label>Jumlah Hari</label>
            <input type="number" name="hari" min="1" value="1" required>

            <button type="submit">Konfirmasi Booking</button>
        </form>

        <a href="{% url 'home' %}" class="back">Kembali ke Home</a>
    </div>
</div>

</body>
</html>
