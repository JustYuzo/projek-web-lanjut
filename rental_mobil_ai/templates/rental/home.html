<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rental Mobil AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f1117;
            color: white;
        }

        .container {
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 36px;
            font-weight: bold;
        }

        .nav {
            display: flex;
            gap: 15px;
        }

        .nav a {
            text-decoration: none;
            padding: 10px 16px;
            background-color: #1f2937;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .nav a:hover {
            background-color: #374151;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 25px;
        }

        .grid {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .card {
            background-color: #171923;
            padding: 20px;
            border-radius: 16px;
            width: 300px;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .img {
            height: 150px;
            background: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            border-radius: 12px;
        }

        .name {
            font-size: 22px;
            margin-top: 15px;
            font-weight: bold;
        }

        .info {
            margin-top: 8px;
            color: #ddd;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            background-color: #14532d;
            border-radius: 10px;
            text-align: center;
            color: #86efac;
        }

        .btn {
            margin-top: 15px;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            text-align: center;
            display: block;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>

<body>
<div class="container">

    <div class="header">
        <div class="title">🚗 Rental Mobil AI</div>

        <div class="nav">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'history' %}">Riwayat</a>
            <a href="{% url 'ai' %}">AI</a>
            <a href="{% url 'api_cars' %}">API</a>
        </div>
    </div>

    <div class="subtitle">
        Temukan mobil terbaik untuk perjalananmu dengan bantuan AI 🚀
    </div>

    <div class="grid">
        {% for car in cars %}
        <div class="card">

            <div class="img">{{ car.image }}</div>

            <div class="name">{{ car.name }}</div>

            <div class="info">💰 Rp {{ car.price }} / hari</div>
            <div class="info">👥 {{ car.capacity }}</div>
            <div class="info">⚙️ {{ car.transmission }}</div>

            <div class="status">{{ car.status }}</div>

            <a href="{% url 'booking' car.id %}" class="btn">Booking</a>

        </div>
        {% endfor %}
    </div>

</div>
</body>
</html>
