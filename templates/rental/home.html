{% load static %}

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SmartDrive</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #eef1f5;
            color: #222;
        }

        .page {
            width: 100%;
            min-height: 100vh;
            background-color: #eef1f5;
        }

        /* ================= NAVBAR ================= */

        .navbar {
            height: 78px;
            background-color: #111827;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 42px;
            overflow: visible;
        }

        .brand {
            font-size: 34px;
            font-weight: 800;
            color: white;
            white-space: nowrap;
        }

        .brand span {
            color: #2f6fde;
        }

        .nav-menu {
            display: flex;
            gap: 34px;
            align-items: center;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
        }

        .nav-menu a:hover {
            color: #2f6fde;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .auth-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .login-btn {
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            padding: 9px 16px;
            border-radius: 7px;
        }

        .login-btn:hover {
            color: #2f6fde;
        }

        .signup-btn {
            background-color: #2f6fde;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            padding: 9px 20px;
            border-radius: 7px;
            border: none;
            display: inline-block;
        }

        .signup-btn:hover {
            background-color: #1d58bf;
        }

        .user-info {
            color: white;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .team-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            transform: scale(1.15);
        }

        /* ================= HERO ================= */

        .hero {
            display: grid;
            grid-template-columns: 1fr 1.35fr;
            align-items: center;
            gap: 70px;
            padding: 80px 120px 70px 120px;
            min-height: 610px;
            background: #eef1f5;
            overflow: visible;
        }

        .hero-text {
            position: relative;
            z-index: 3;
            padding-top: 10px;
        }

        .hero-text h1 {
            font-size: 48px;
            line-height: 1.05;
            margin: 0;
            font-weight: 800;
            color: #222;
            max-width: 470px;
        }

        .hero-text p {
            margin-top: 12px;
            color: #8b8f99;
            font-size: 16px;
        }

        .hero-buttons {
            display: flex;
            gap: 18px;
            margin-top: 28px;
        }

        .btn-primary {
            background-color: #2f6fde;
            color: white;
            padding: 13px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            border: none;
            display: inline-block;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: #1d58bf;
        }

        .hero-car {
            width: 100%;
            height: 430px;
            min-height: 430px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            margin-bottom: 0;
        }

        .hero-car::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(
                    rgba(238, 241, 245, 0.68),
                    rgba(238, 241, 245, 0.68)
                ),
                url("{% static 'images/bg-mobil.jpg' %}");
            background-size: cover;
            background-position: center;
            opacity: 0.9;
            z-index: 1;
        }

        .hero-car::after {
            content: "";
            position: absolute;
            width: 560px;
            height: 560px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.55);
            top: -135px;
            left: -95px;
            z-index: 2;
        }

        .hero-car img {
            width: 660px;
            max-width: 94%;
            object-fit: contain;
            position: relative;
            z-index: 3;
            transform: translateX(8px);
            filter: drop-shadow(0 24px 18px rgba(0, 0, 0, 0.18));
        }

        /* ================= FILTER BOX ================= */

        .filter-wrapper {
            padding: 0 145px 80px 145px;
            margin-top: 0;
            position: relative;
            z-index: 5;
        }

        .filter-box {
            background-color: white;
            border-radius: 16px;
            padding: 12px;
            display: grid;
            grid-template-columns: 1.1fr 1fr 1fr 0.6fr;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .filter-input {
            height: 54px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 0 18px;
            color: #777;
            font-weight: 700;
            background-color: #fff;
            outline: none;
            font-size: 14px;
        }

        .filter-input:focus {
            border-color: #2f6fde;
        }

        .filter-btn {
            height: 54px;
            border: none;
            border-radius: 12px;
            background-color: #2f6fde;
            color: white;
            font-weight: 800;
            cursor: pointer;
            font-size: 14px;
        }

        .filter-btn:hover {
            background-color: #1d58bf;
        }

        /* ================= RESPONSIVE ================= */

        @media (max-width: 1200px) {
            .hero {
                padding: 70px 80px 65px 80px;
                gap: 55px;
            }

            .hero-car img {
                width: 620px;
            }

            .filter-wrapper {
                padding-left: 80px;
                padding-right: 80px;
            }
        }

        @media (max-width: 1100px) {
            .navbar {
                padding: 0 28px;
            }

            .brand {
                font-size: 30px;
            }

            .nav-menu {
                gap: 22px;
            }

            .hero {
                padding: 60px 70px 60px 70px;
            }

            .hero-car {
                height: 400px;
                min-height: 400px;
            }

            .hero-car img {
                width: 590px;
            }

            .filter-wrapper {
                padding-left: 70px;
                padding-right: 70px;
            }
        }

        @media (max-width: 1000px) {
            .hero {
                grid-template-columns: 1fr;
                padding: 55px 40px 45px 40px;
                text-align: center;
                gap: 35px;
                min-height: auto;
            }

            .hero-text h1 {
                max-width: 100%;
            }

            .hero-buttons {
                justify-content: center;
            }

            .hero-car {
                height: 380px;
                min-height: 380px;
            }

            .hero-car::after {
                width: 480px;
                height: 480px;
                top: -120px;
                left: 50%;
                transform: translateX(-50%);
            }

            .hero-car img {
                width: 580px;
                transform: translateX(0);
            }

            .filter-wrapper {
                padding-left: 40px;
                padding-right: 40px;
            }

            .nav-menu {
                gap: 18px;
            }

            .auth-buttons {
                gap: 8px;
            }

            .login-btn,
            .signup-btn {
                font-size: 11px;
                padding: 8px 12px;
            }
        }

        @media (max-width: 780px) {
            .navbar {
                height: auto;
                min-height: 78px;
                padding: 16px 20px;
                flex-wrap: wrap;
                gap: 14px;
            }

            .brand {
                font-size: 26px;
            }

            .nav-menu {
                order: 3;
                width: 100%;
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 18px;
            }

            .nav-right {
                gap: 10px;
            }

            .auth-buttons {
                gap: 6px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .login-btn {
                padding: 7px 8px;
            }

            .signup-btn {
                padding: 7px 10px;
            }

            .team-logo {
                width: 60px;
                height: 60px;
                transform: scale(1.1);
            }

            .hero {
                padding: 50px 25px 40px 25px;
            }

            .hero-text h1 {
                font-size: 34px;
            }

            .hero-text p {
                font-size: 14px;
            }

            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn-primary {
                width: 220px;
                text-align: center;
            }

            .hero-car {
                height: 310px;
                min-height: 310px;
                border-radius: 18px;
            }

            .hero-car::after {
                width: 390px;
                height: 390px;
                top: -95px;
            }

            .hero-car img {
                width: 480px;
            }

            .filter-wrapper {
                padding-left: 25px;
                padding-right: 25px;
            }

            .filter-box {
                grid-template-columns: 1fr;
                padding: 14px;
            }

            .filter-input,
            .filter-btn {
                height: 52px;
            }
        }

        @media (max-width: 500px) {
            .navbar {
                justify-content: center;
                text-align: center;
            }

            .nav-right {
                flex-direction: column;
            }

            .auth-buttons {
                justify-content: center;
            }

            .hero {
                padding: 42px 20px 35px 20px;
            }

            .hero-car {
                height: 260px;
                min-height: 260px;
            }

            .hero-car img {
                width: 410px;
            }

            .hero-car::after {
                width: 320px;
                height: 320px;
                top: -80px;
            }

            .filter-wrapper {
                padding-left: 20px;
                padding-right: 20px;
                padding-bottom: 60px;
            }
        }
    </style>
</head>

<body>
<div class="page">

    <nav class="navbar">
        <div class="brand">
            <span>Smart</span>Drive
        </div>

        <div class="nav-menu">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'katalog' %}">Katalog</a>
            <a href="{% url 'ai' %}">AI</a>
            <a href="{% url 'history' %}">Riwayat</a>
        </div>

        <div class="nav-right">
            <div class="auth-buttons">
                {% if user.is_authenticated %}
                    <span class="user-info">
                        Halo, {{ user.first_name|default:user.username }}
                    </span>
                    <a href="{% url 'logout' %}" class="signup-btn">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="login-btn">Login</a>
                    <a href="{% url 'signup' %}" class="signup-btn">Sign Up</a>
                {% endif %}
            </div>

            <img src="{% static 'images/logo-tim.png' %}" class="team-logo" alt="Logo Tim">
        </div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Sewa Mobil Pintar</h1>
            <p>Pilih mobil yang anda inginkan sekarang juga</p>

            <div class="hero-buttons">
                <a href="{% url 'ai' %}" class="btn-primary">AI Rekomendasi</a>
                <a href="{% url 'katalog' %}" class="btn-primary">Sewa Sekarang</a>
            </div>
        </div>

        <div class="hero-car">
            <img src="{% static 'images/mobil-hitam.png' %}" alt="Mobil Hitam">
        </div>
    </section>

    <div class="filter-wrapper">
        <div class="filter-box">
            <input type="date" id="tanggalSewa" class="filter-input">

            <select id="tipeMobil" class="filter-input">
                <option value="">Tipe Mobil</option>
                <option value="Manual">Manual</option>
                <option value="Matic">Matic</option>
            </select>

            <select id="carSize" class="filter-input">
                <option value="">Car Size</option>
                <option value="5">5 Orang</option>
                <option value="7">7 Orang</option>
            </select>

            <button type="button" class="filter-btn" onclick="cariMobil()">
                Sewa Sekarang
            </button>
        </div>
    </div>

</div>

<script>
    function cariMobil() {
        const tanggal = document.getElementById("tanggalSewa").value;
        const tipeMobil = document.getElementById("tipeMobil").value;
        const carSize = document.getElementById("carSize").value;

        if (tanggal === "") {
            alert("Pilih tanggal sewa terlebih dahulu.");
            return;
        }

        if (tipeMobil === "") {
            alert("Pilih tipe mobil terlebih dahulu.");
            return;
        }

        if (carSize === "") {
            alert("Pilih ukuran mobil terlebih dahulu.");
            return;
        }

        const katalogUrl = "{% url 'katalog' %}";
        const finalUrl = katalogUrl
            + "?tanggal=" + encodeURIComponent(tanggal)
            + "&transmission=" + encodeURIComponent(tipeMobil)
            + "&capacity=" + encodeURIComponent(carSize);

        window.location.href = finalUrl;
    }
</script>

</body>
</html>
