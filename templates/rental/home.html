{% load static %}

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SmartDrive</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #eef1f5;
            color: #222;
        }

        .page {
            width: 100%;
            min-height: 100vh;
            background-color: #eef1f5;
        }

        .navbar {
            height: 78px;
            background-color: #111827;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 42px;
            overflow: visible;
        }

        .brand {
            font-size: 34px;
            font-weight: 800;
            color: white;
            white-space: nowrap;
        }

        .brand span {
            color: #2f6fde;
        }

        .nav-menu {
            display: flex;
            gap: 34px;
            align-items: center;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
        }

        .nav-menu a:hover {
            color: #2f6fde;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .auth-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .login-btn {
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            padding: 9px 16px;
            border-radius: 7px;
        }

        .login-btn:hover {
            color: #2f6fde;
        }

        .signup-btn {
            background-color: #2f6fde;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            padding: 9px 20px;
            border-radius: 7px;
            border: none;
            display: inline-block;
        }

        .signup-btn:hover {
            background-color: #1d58bf;
        }

        .user-info {
            color: white;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .team-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            transform: scale(1.15);
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr 1.35fr;
            align-items: center;
            padding: 70px 120px 45px 120px;
            min-height: calc(100vh - 78px);
        }

        .hero-text h1 {
            font-size: 48px;
            line-height: 1.05;
            margin: 0;
            font-weight: 800;
            color: #222;
            max-width: 470px;
        }

        .hero-text p {
            margin-top: 12px;
            color: #8b8f99;
            font-size: 16px;
        }

        .hero-buttons {
            display: flex;
            gap: 18px;
            margin-top: 28px;
        }

        .btn-primary {
            background-color: #2f6fde;
            color: white;
            padding: 13px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            border: none;
            display: inline-block;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: #1d58bf;
        }

        .hero-car {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-car img {
            width: 650px;
            max-width: 100%;
            object-fit: contain;
        }

        .filter-wrapper {
            padding: 0 145px 70px 145px;
            margin-top: -60px;
        }

        .filter-box {
            background-color: white;
            border-radius: 14px;
            padding: 10px;
            display: grid;
            grid-template-columns: 1.1fr 1fr 1fr 0.6fr;
            gap: 10px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
        }

        .filter-input {
            height: 42px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 0 18px;
            color: #777;
            font-weight: 600;
            background-color: #fff;
            outline: none;
        }

        .filter-input:focus {
            border-color: #2f6fde;
        }

        .filter-btn {
            border: none;
            border-radius: 10px;
            background-color: #2f6fde;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .filter-btn:hover {
            background-color: #1d58bf;
        }

        @media (max-width: 1100px) {
            .navbar {
                padding: 0 28px;
            }

            .brand {
                font-size: 30px;
            }

            .nav-menu {
                gap: 22px;
            }

            .hero {
                padding: 60px 70px 45px 70px;
            }

            .filter-wrapper {
                padding-left: 70px;
                padding-right: 70px;
            }
        }

        @media (max-width: 1000px) {
            .hero {
                grid-template-columns: 1fr;
                padding: 50px 40px;
                text-align: center;
            }

            .hero-text h1 {
                max-width: 100%;
            }

            .hero-buttons {
                justify-content: center;
            }

            .filter-wrapper {
                padding-left: 40px;
                padding-right: 40px;
                margin-top: 0;
            }

            .nav-menu {
                gap: 18px;
            }

            .auth-buttons {
                gap: 8px;
            }

            .login-btn,
            .signup-btn {
                font-size: 11px;
                padding: 8px 12px;
            }
        }

        @media (max-width: 780px) {
            .navbar {
                height: auto;
                min-height: 78px;
                padding: 16px 20px;
                flex-wrap: wrap;
                gap: 14px;
            }

            .brand {
                font-size: 26px;
            }

            .nav-menu {
                order: 3;
                width: 100%;
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 18px;
            }

            .nav-right {
                gap: 10px;
            }

            .auth-buttons {
                gap: 6px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .login-btn {
                padding: 7px 8px;
            }

            .signup-btn {
                padding: 7px 10px;
            }

            .team-logo {
                width: 60px;
                height: 60px;
                transform: scale(1.1);
            }

            .hero {
                min-height: auto;
                padding: 50px 25px 35px 25px;
            }

            .hero-text h1 {
                font-size: 34px;
            }

            .hero-buttons {
                flex-direction: column;
            }

            .filter-box {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 500px) {
            .navbar {
                justify-content: center;
                text-align: center;
            }

            .nav-right {
                flex-direction: column;
            }

            .auth-buttons {
                justify-content: center;
            }

            .filter-wrapper {
                padding-left: 20px;
                padding-right: 20px;
            }
        }
    </style>
</head>

<body>
<div class="page">

    <nav class="navbar">
        <div class="brand">
            <span>Smart</span>Drive
        </div>

        <div class="nav-menu">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'katalog' %}">Katalog</a>
            <a href="{% url 'ai' %}">AI</a>
            <a href="{% url 'history' %}">Riwayat</a>
            <a href="{% url 'api_cars' %}">API</a>
        </div>

        <div class="nav-right">
            <div class="auth-buttons">
                {% if user.is_authenticated %}
                    <span class="user-info">
                        Halo, {{ user.first_name|default:user.username }}
                    </span>
                    <a href="{% url 'logout' %}" class="signup-btn">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="login-btn">Login</a>
                    <a href="{% url 'signup' %}" class="signup-btn">Sign Up</a>
                {% endif %}
            </div>

            <img src="{% static 'images/logo-tim.png' %}" class="team-logo" alt="Logo Tim">
        </div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Sewa Mobil Pintar</h1>
            <p>Pilih mobil yang anda inginkan sekarang juga</p>

            <div class="hero-buttons">
                <a href="{% url 'ai' %}" class="btn-primary">AI Rekomendasi</a>
                <a href="{% url 'katalog' %}" class="btn-primary">Sewa Sekarang</a>
            </div>
        </div>

        <div class="hero-car">
            <img src="{% static 'images/mobil-hitam.png' %}" alt="Mobil Hitam">
        </div>
    </section>

    <div class="filter-wrapper">
        <div class="filter-box">
            <input type="date" class="filter-input">

            <select class="filter-input">
                <option>Tipe Mobil</option>
                <option>Manual</option>
                <option>Matic</option>
            </select>

            <select class="filter-input">
                <option>Car Size</option>
                <option>5 Orang</option>
                <option>7 Orang</option>
            </select>

            <button class="filter-btn" onclick="window.location.href='{% url 'katalog' %}'">
                Sewa Sekarang
            </button>
        </div>
    </div>

</div>
</body>
</html>
